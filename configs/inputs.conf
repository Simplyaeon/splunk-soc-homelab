# Universal Forwarder — linux-target (192.168.56.20)
# Path: /opt/splunkforwarder/etc/system/local/inputs.conf
#
# Maps each monitored log file to its destination index + sourcetype.

[monitor:///var/log/auth.log]
index = linux_auth
sourcetype = linux_secure

[monitor:///var/log/syslog]
index = linux_syslog
sourcetype = syslog

[monitor:///var/log/audit/audit.log]
index = linux_audit
sourcetype = linux_audit

[monitor:///var/log/ufw.log]
index = linux_network
sourcetype = ufw
